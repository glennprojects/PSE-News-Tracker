name: Daily PSEi News & Signal Update

on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 2:00 AM UTC (10:00 AM PHT)
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the updated files back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Data Generator
        run: python generate.py

      - name: Commit and push updated data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git commit -m "chore: auto-update news signals and backtest data" || echo "No changes to commit"
          git push
